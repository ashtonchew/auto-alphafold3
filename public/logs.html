<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto-AlphaFold3 · Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/modal.css">
</head>
<body>
<div class="board"><header class="topbar"><div class="tb-group"><h1 class="app-name">Auto-AlphaFold3</h1></div><div class="tb-group tb-right"><div class="seg" role="group" aria-label="View"><a class="seg-btn" href="index.html">Board</a><a class="seg-btn" href="trials.html">Trials</a><a class="seg-btn is-active" href="logs.html">Logs</a></div><div class="ctx-pill"><span class="dot-live"></span><span class="ctx-val">public_val_small</span><span class="ctx-sep">·</span><span class="ctx-val">calpha_lddt_v1</span><svg class="chev" viewBox="0 0 12 12" fill="none"><path d="M3 4.5 6 7.5 9 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="spill ok">live</span></div></header><div class="row" style="border-top:0;padding-top:8px"><h2 class="block-title">Logs</h2><div class="block-sub">Orchestrator and trial events for the run.</div><div class="log-toolbar"><div class="log-search"><svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><input type="text" id="logSearch" placeholder="Search logs" aria-label="Search logs"></div></div><div class="logfeed" id="logFeed"><div class="logrow" data-text=" t000 submitted"><span class="logdot info"></span><span class="logtime">—</span><span class="logtrial">T000</span><span class="logmsg">submitted</span></div><div class="logrow" data-text=" t000 scored · best_val_calpha_lddt 0.079"><span class="logdot ok"></span><span class="logtime">—</span><span class="logtrial">T000</span><span class="logmsg">scored · best_val_calpha_lddt 0.079</span></div></div></div><footer class="board-foot"><span>Live · runs (per-trial metrics)</span><span>Generated by autoalphafold3.ui.build</span></footer></div>
<script>
(function(){var inp=document.getElementById('logSearch'),feed=document.getElementById('logFeed');if(!inp||!feed)return;var rows=feed.querySelectorAll('.logrow');inp.addEventListener('input',function(){var q=inp.value.trim().toLowerCase();rows.forEach(function(r){r.style.display=(!q||r.getAttribute('data-text').indexOf(q)>=0)?'':'none';});});})();
</script>
</body>
</html>
